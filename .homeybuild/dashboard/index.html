<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Shelly Wall Display Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header-left">
      <svg class="logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" rx="8" fill="#F5A623"/>
        <path d="M16 7 L25 14 L25 25 L19 25 L19 19 L13 19 L13 25 L7 25 L7 14 Z" fill="white"/>
      </svg>
      <span class="header-title">My Home</span>
    </div>
    <div class="header-right">
      <button id="view-toggle" class="view-toggle-btn" onclick="toggleView()">⊞ Alle</button>
      <span id="clock" class="clock"></span>
    </div>
  </header>

  <main id="main" class="main">
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Lade Geräte…</p>
    </div>
    <div id="error-msg" class="error-msg" style="display:none">
      <p>&#9888; Verbindung fehlgeschlagen</p>
      <button onclick="loadData()">Erneut versuchen</button>
    </div>
    <div id="zones-container" style="display:none"></div>
  </main>

  <script src="client.js"></script>
</body>
</html>
