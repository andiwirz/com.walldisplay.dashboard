<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Shelly Wall Display Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header-left">
      <svg class="logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" rx="8" fill="#F5A623"/>
        <path d="M16 7 L25 14 L25 25 L19 25 L19 19 L13 19 L13 25 L7 25 L7 14 Z" fill="white"/>
      </svg>
      <span class="header-title">My Homey</span>
    </div>
    <div class="header-right">
      <button id="view-toggle" class="view-toggle-btn" onclick="toggleView()">⊞ All</button>
      <button id="theme-toggle" class="theme-toggle-btn" onclick="toggleTheme()" aria-label="Toggle dark mode">☀️</button>
      <span id="clock" class="clock"></span>
    </div>
  </header>

  <main id="main" class="main">
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Loading devices…</p>
    </div>
    <div id="error-msg" class="error-msg" style="display:none">
      <p>&#9888; Connection failed</p>
      <button onclick="loadData()">Try again</button>
    </div>
    <div id="zones-container" style="display:none"></div>
  </main>

  <!-- PIN-Modal -->
  <div id="pin-modal" class="pin-modal" style="display:none">
    <div class="pin-modal-inner">
      <div class="pin-modal-title" id="pin-modal-title">Enter PIN</div>
      <div class="pin-dots" id="pin-dots">
        <span></span><span></span><span></span><span></span>
      </div>
      <div class="pin-error" id="pin-error"></div>
      <div class="pin-pad">
        <button onclick="pinKey('1')">1</button>
        <button onclick="pinKey('2')">2</button>
        <button onclick="pinKey('3')">3</button>
        <button onclick="pinKey('4')">4</button>
        <button onclick="pinKey('5')">5</button>
        <button onclick="pinKey('6')">6</button>
        <button onclick="pinKey('7')">7</button>
        <button onclick="pinKey('8')">8</button>
        <button onclick="pinKey('9')">9</button>
        <button onclick="pinCancel()" class="pin-cancel">✕</button>
        <button onclick="pinKey('0')">0</button>
        <button onclick="pinBackspace()" class="pin-back">⌫</button>
      </div>
    </div>
  </div>

  <!-- Kamera-Modal -->
  <div id="camera-modal" class="camera-modal" style="display:none" onclick="closeCameraModal()">
    <div class="camera-modal-inner" onclick="event.stopPropagation()">
      <div class="camera-modal-header">
        <span id="camera-modal-title"></span>
        <button class="camera-modal-close" onclick="closeCameraModal()">✕</button>
      </div>
      <div class="camera-modal-body">
        <img id="camera-modal-img" class="camera-modal-img" alt="Camera image" src="">
        <div id="camera-modal-error" class="camera-modal-error" style="display:none">No image available</div>
      </div>
    </div>
  </div>

  <script src="client.js"></script>
</body>
</html>
